{% extends "base.html" %}

{% block title %}Вход - TLTQUIZ{% endblock %}

{% block content %}
    <section class="hero">
        <h1>Вход в личный кабинет</h1>
        <p>Войдите, чтобы управлять регистрациями и участвовать в квизах</p>
    </section>

    <div style="max-width: 500px; margin: 2rem auto;">
        <div class="card">
            <form method="POST">
                <div class="form-group">
                    <label for="username">Логин или Email *</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="remember" name="remember" style="width: auto;">
                    <label for="remember" style="margin-bottom: 0; font-weight: normal;">Запомнить меня</label>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="margin-top: 1.5rem; padding: 0.8rem;">Войти</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--light-gray);">
                <p class="card-text">Нет аккаунта? <a href="{{ url_for('register') }}" style="color: var(--yellow-pastel); text-decoration: none;">Зарегистрируйтесь</a></p>
                <p class="card-text text-muted" style="font-size: 0.85rem; margin-top: 1rem;">Забыли пароль? <a href="#" style="color: var(--yellow-pastel); text-decoration: none;">Восстановить</a></p>
            </div>
        </div>
    </div>
{% endblock %}
