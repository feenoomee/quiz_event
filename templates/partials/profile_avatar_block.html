<div class="profile-avatar-wrap">
  <label class="profile-avatar" title="Нажмите, чтобы выбрать фото">
    <img class="profile-avatar-img" alt="" decoding="async">
    <span class="profile-avatar-letter">{{ (current_user.name[0] if current_user and current_user.name else '?')|upper }}</span>
    <input type="file" class="profile-avatar-input" id="profileAvatarInput" accept="image/png,image/jpeg,image/webp,image/gif" aria-label="Загрузить аватар">
  </label>
  <button type="button" class="profile-avatar-remove" id="profileAvatarRemove" hidden>Убрать фото</button>
</div>
